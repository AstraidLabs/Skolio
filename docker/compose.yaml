services:
  webhost:
    build:
      context: ..
      dockerfile: src/Skolio.WebHost/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Frontend__UseViteDevServer: true
      ServiceEndpoints__IdentityApi: http://localhost:8081
      ServiceEndpoints__OidcClientId: skolio-frontend
      ServiceEndpoints__OidcRedirectUri: http://localhost:5173/auth/callback
      ServiceEndpoints__OidcPostLogoutRedirectUri: http://localhost:5173/
      ServiceEndpoints__OidcScope: openid profile skolio_api
      ServiceEndpoints__OrganizationApi: http://localhost:8082
      ServiceEndpoints__AcademicsApi: http://localhost:8083
      ServiceEndpoints__CommunicationApi: http://localhost:8084
      ServiceEndpoints__AdministrationApi: http://localhost:8085
    ports:
      - "8080:8080"
    depends_on:
      identity-api:
        condition: service_healthy
      organization-api:
        condition: service_healthy
      academics-api:
        condition: service_healthy
      communication-api:
        condition: service_healthy
      administration-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  identity-api:
    build:
      context: ..
      dockerfile: src/Services/Identity/Skolio.Identity.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Identity__Database__ConnectionString: Host=postgresql;Port=5432;Database=skolio_identity;Username=skolio;Password=skolio
      Identity__Redis__ConnectionString: redis:6379
      Identity__Redis__InstanceName: skolio:identity
      Identity__Service__PublicBaseUrl: http://identity-api:8080
      Identity__OpenIddict__Issuer: http://localhost:8081
      Identity__Jwt__AccessTokenLifetime: 00:30:00
      Identity__Jwt__IssueRefreshTokens: false
      Identity__Jwks__DiscoveryPath: /.well-known/jwks.json
      Identity__Jwks__KeySetId: skolio-identity-signing-k1
      Identity__Signing__UseDevelopmentCertificate: true
      Identity__Signing__KeyId: skolio-identity-signing-k1
      Identity__OpenIddict__FrontendClient__ClientId: skolio-frontend
      Identity__OpenIddict__FrontendClient__DisplayName: Skolio Frontend
      Identity__OpenIddict__FrontendClient__RedirectUris__0: http://localhost:5173/auth/callback
      Identity__OpenIddict__FrontendClient__PostLogoutRedirectUris__0: http://localhost:5173/
      
    ports:
      - "8081:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  organization-api:
    build:
      context: ..
      dockerfile: src/Services/Organization/Skolio.Organization.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Organization__Database__ConnectionString: Host=postgresql;Port=5432;Database=skolio_organization;Username=skolio;Password=skolio
      Organization__Redis__ConnectionString: redis:6379
      Organization__Redis__InstanceName: skolio:organization
      Organization__Service__PublicBaseUrl: http://organization-api:8080
      Organization__Auth__Authority: http://identity-api:8080
      Organization__Auth__Audience: skolio_api
      Organization__Auth__RequireHttpsMetadata: false
      
    ports:
      - "8082:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  academics-api:
    build:
      context: ..
      dockerfile: src/Services/Academics/Skolio.Academics.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Academics__Database__ConnectionString: Host=postgresql;Port=5432;Database=skolio_academics;Username=skolio;Password=skolio
      Academics__Redis__ConnectionString: redis:6379
      Academics__Redis__InstanceName: skolio:academics
      Academics__Service__PublicBaseUrl: http://academics-api:8080
      Academics__Auth__Authority: http://identity-api:8080
      Academics__Auth__Audience: skolio_api
      Academics__Auth__RequireHttpsMetadata: false
      
    ports:
      - "8083:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  communication-api:
    build:
      context: ..
      dockerfile: src/Services/Communication/Skolio.Communication.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Communication__Database__ConnectionString: Host=postgresql;Port=5432;Database=skolio_communication;Username=skolio;Password=skolio
      Communication__Redis__ConnectionString: redis:6379
      Communication__Redis__InstanceName: skolio:communication
      Communication__Service__PublicBaseUrl: http://communication-api:8080
      Communication__Auth__Authority: http://identity-api:8080
      Communication__Auth__Audience: skolio_api
      Communication__Auth__RequireHttpsMetadata: false
      
    ports:
      - "8084:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  administration-api:
    build:
      context: ..
      dockerfile: src/Services/Administration/Skolio.Administration.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      Administration__Database__ConnectionString: Host=postgresql;Port=5432;Database=skolio_administration;Username=skolio;Password=skolio
      Administration__Redis__ConnectionString: redis:6379
      Administration__Redis__InstanceName: skolio:administration
      Administration__Service__PublicBaseUrl: http://administration-api:8080
      Administration__Auth__Authority: http://identity-api:8080
      Administration__Auth__Audience: skolio_api
      Administration__Auth__RequireHttpsMetadata: false
      Administration__Hangfire__StorageConnectionString: Host=postgresql;Port=5432;Database=skolio_administration;Username=skolio;Password=skolio
      Administration__Hangfire__SchemaName: hangfire
      
    ports:
      - "8085:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: src/Frontend/Skolio.Frontend/Dockerfile
    ports:
      - "5174:80"

  postgresql:
    image: postgres:17
    environment:
      POSTGRES_USER: skolio
      POSTGRES_PASSWORD: skolio
      POSTGRES_DB: postgres
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skolio -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgresql_data:
  redis_data:

